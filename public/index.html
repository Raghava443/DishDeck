<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishDeck | Premium Dining</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: #111;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Abstract Background */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url("https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=1920&q=80") center/cover no-repeat;
            opacity: 0.4;
            z-index: 1;
            transform: scale(1.1);
            animation: zoomBg 20s infinite alternate linear;
        }
        @keyframes zoomBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(17,17,17,0.9) 0%, rgba(30,20,5,0.7) 100%);
            z-index: 2;
        }

        /* Content Container */
        .promo-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 40px;
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(244, 196, 48, 0.3);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            max-width: 600px;
            transform: translateY(50px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.5s;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #f4c430;
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(244,196,48,0.4);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-glow {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #f4c430, #e6b800);
            color: #111;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(244, 196, 48, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(244, 196, 48, 0.6);
            background: linear-gradient(45deg, #ffdc5c, #f4c430);
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50% { left: 200%; }
            100% { left: 200%; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="overlay"></div>
    
    <div class="promo-content">
        <h1>DishDeck</h1>
        <p>Experience the epitome of fine dining. Indulge in exquisite culinary creations crafted by world-class chefs in a breathtaking ambiance.</p>
        <a href="login.html" class="btn-glow">Enter the Experience</a>
    </div>
</body>
</html>
